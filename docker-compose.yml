version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: finance_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-login}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-finance_tracker}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-login} -d ${DB_NAME:-finance_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: finance_backend
    restart: always
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://${DB_USER:-login}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-finance_tracker}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: finance_frontend
    restart: always
    ports:
      - '8080:80'
    depends_on:
      - backend

volumes:
  postgres_data: